<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="./style.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="blog-card">
      <img src="./assets/images/illustration-article.svg" role="presentation" />
      <section class="blog-main">
        <div class="blog-tags">
          <a class="blog-tag" href="#">Learning</a>
        </div>
        <div class="blog-date">Published 21 Dec 2023</div>
        <h1><a href="#">HTML & CSS foundations</a></h1>
        <p>
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </section>
      <section class="blog-byline">
        <figure>
          <img
            src="./assets/images/image-avatar.webp"
            alt="Photo of Greg Hooper"
          />
          <figcaption><a href="#">Greg Hooper</a></figcaption>
        </figure>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/rjgraffham">RJ Graffham</a>.
    </footer>
  </body>
</html>
